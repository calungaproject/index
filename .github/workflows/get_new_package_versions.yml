name: Get New Package Versions

on:
  # TODO: replace with reasonable cron schedule
  #schedule:
  #  - cron: '0 */12 * * *'
  #  running on every push during testing
  push

jobs:
  # first job will run a script to get a list of packages to update
  check-for-updates:
    runs-on: ubuntu-latest
    outputs:
      updates: ${{ steps.run-script.outputs.updates }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: run the check-package-updates script
        id: run-script
        run: ./hack/check-package-updates >> "$GITHUB_OUTPUT"

  create-prs:
    runs-on: ubuntu-latest
    needs: check-for-updates
    strategy:
      matrix:
        update: ${{ fromJSON(needs.check-for-updates.outputs.updates) }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: update the packages.txt
        env:
          update: ${{ matrix.update }}
        run: ./hack/replace-package "$update"
      - name: create PR
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Automatic update ${{ matrix.update }}
          title: Automatic update ${{ matrix.update }}
          branch-suffix: short-commit-hash
          delete-branch: true
          base: main
          labels: |
            automated
      # automerge
      # - name: enable PR automerge
      #   if steps.create-pr.outputs.pull-request-operation == 'created'
      #   uses: peter-evans/enable-pull-request-automerge@v3
      #   with:
      #     pull-request-number: ${{ steps.create-pr.outputs.pull-request-nubmer }}
      #     merge-method: rebase
